services:

  # ── Zep dependencies ──────────────────────────────────────────────────────

  postgres:
    image: ankane/pgvector:latest
    container_name: mirofish-postgres
    environment:
      POSTGRES_USER: zep
      POSTGRES_PASSWORD: zep
      POSTGRES_DB: zep
    volumes:
      - zep-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zep"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    container_name: mirofish-neo4j
    environment:
      NEO4J_AUTH: neo4j/mirofish-neo4j
    volumes:
      - neo4j-data:/data
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  graphiti:
    image: zepai/graphiti:latest
    container_name: mirofish-graphiti
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ollama
      OPENAI_BASE_URL: http://host.docker.internal:11434/v1
      MODEL_NAME: qwen3.5:4b
      EMBEDDING_MODEL_NAME: nomic-embed-text:latest
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: mirofish-neo4j
    ports:
      - "8003:8003"
    restart: unless-stopped

  zep:
    image: zepai/zep:latest
    container_name: mirofish-zep
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./zep/zep.yaml:/app/zep.yaml
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── MiroFish ──────────────────────────────────────────────────────────────

  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    platform: linux/amd64
    container_name: mirofish
    depends_on:
      - zep
    command: >
      sh -lc "cd /app/backend && uv sync --frozen && cd /app && npm run dev"
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend
      - ./frontend/src:/app/frontend/src

volumes:
  zep-postgres-data:
  neo4j-data:
